plugins {
    id 'net.neoforged.gradle' version '7.0' apply false
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
}

rootProject.name = 'omnichunk'

version = '1.1.0'
group = 'com.danjb.omnichunk'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    accessTransformers.set(file('src/main/resources/META-INF/accesstransformer.cfg'))
    
    runs {
        client {
            workingDirectory = file('run')
            modSource project.sourceSets.main
            client = true
        }
        server {
            workingDirectory = file('run')
            modSource project.sourceSets.main
        }
    }
}

repositories {
    maven { url = 'https://maven.neoforged.net/releases' }
}

dependencies {
    minecraft 'net.neoforged:neoforge:1.21.3'
    annotationProcessor 'net.neoforged:neoforge:1.21.3'
}

jar {
    manifest {
        attributes([
            'Specification-Title': 'omnichunk',
            'Specification-Vendor': 'danjb',
            'Specification-Version': '1',
            'Implementation-Title': project.main_class,
            'Implementation-Vendor': 'danjb',
            'Implementation-Version': project.jar.archiveVersion
        ])
    }
}

jar.finalizedBy('reobfJar')

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
